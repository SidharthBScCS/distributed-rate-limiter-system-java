spring.application.name=ratelimiter
spring.config.import=optional:file:./local.properties,optional:file:./distributed-rate-limiter-backend/local.properties
spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/ratelimiter_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:KRMDelhi@2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
spring.devtools.restart.enabled=false
server.port=${PORT:8082}
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:400}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:200}
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=6000ms

ratelimiter.redis-prefix=ratelimiter
ratelimiter.default-algorithm=SLIDING_WINDOW
ratelimiter.api-key-cache-refresh-ms=${RATELIMITER_API_KEY_CACHE_REFRESH_MS:30000}
ratelimiter.stats.flush-ms=${RATELIMITER_STATS_FLUSH_MS:5000}
ratelimiter.audit.enabled=${RATELIMITER_AUDIT_ENABLED:true}
ratelimiter.audit.flush-ms=${RATELIMITER_AUDIT_FLUSH_MS:1000}
ratelimiter.audit.batch-size=${RATELIMITER_AUDIT_BATCH_SIZE:200}
ratelimiter.audit.queue-capacity=${RATELIMITER_AUDIT_QUEUE_CAPACITY:5000}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.endpoint.metrics.access=unrestricted
management.metrics.tags.application=${spring.application.name}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

auth.admin.username=${AUTH_ADMIN_USERNAME:admin}
auth.admin.password=${AUTH_ADMIN_PASSWORD:admin@2026}
auth.admin.full-name=${AUTH_ADMIN_FULL_NAME:API Administrator}
auth.admin.email=${AUTH_ADMIN_EMAIL:admin@ratelimiter.local}
jwt.secret=${JWT_SECRET:change-this-jwt-secret-key-to-a-32-byte-minimum-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

ui.grafana.dashboard-url=http://localhost:3001/d/adqskbg/total-request-rate?orgId=1&from=now-6h&to=now&timezone=browser
ui.refresh-interval-ms=500
ui.dashboard-cache-ttl-ms=500
ui.defaults.rate-limit=10
ui.defaults.window-seconds=60
ui.defaults.algorithm=SLIDING_WINDOW
ui.allowed-algorithms=SLIDING_WINDOW
app.bootstrap.seed-data=${APP_BOOTSTRAP_SEED_DATA:false}
