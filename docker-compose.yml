name: ratelimiter-deploy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ratelimiter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ratelimiter_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./distributed-rate-limiter-backend
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/ratelimiter_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FRONTEND_BASE_URL: http://localhost:5173
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTH_ADMIN_USERNAME: admin
      AUTH_ADMIN_PASSWORD: admin
      AUTH_ADMIN_FULL_NAME: ADMIN
      AUTH_ADMIN_EMAIL: admin@ratelimiter.local
      JWT_SECRET: change-this-jwt-secret-key-to-a-32-byte-minimum-value
      UI_GRAFANA_DASHBOARD_URL: http://localhost:5050/d/adqskbg/rate-limiter-neon-command-grid?orgId=1&from=now-15m&to=now&timezone=browser&refresh=5s
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.10.0
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.docker.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.0
    ports:
      - "5050:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_CONTENT_SECURITY_POLICY: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DATASOURCE_PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
