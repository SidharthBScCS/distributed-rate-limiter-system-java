apiVersion: 1

datasources:
  - uid: prometheus
    name: Prometheus
    type: prometheus
    access: proxy
    # inside docker-compose, use service DNS name.
    # can still be overridden via GF_DATASOURCE_PROMETHEUS_URL.
    url: "${GF_DATASOURCE_PROMETHEUS_URL:http://prometheus:9090}"
    isDefault: true
    editable: true
